version: "3.8"

services:
  # ══════════════════════════════════════════════════════════
  #  INFRASTRUCTURE — 2 CPU / 4 GB RAM
  # ══════════════════════════════════════════════════════════

  # ── Reverse Proxy & Router ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - django_media:/app/media:ro
    depends_on:
      core-django:
        condition: service_started
      ai-service-en:
        condition: service_started
      ai-service-zh:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Message Broker & Result Backend ──
  redis:
    image: redis:alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 1G
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Database ──
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xiaoyue
      POSTGRES_USER: xiaoyue
      POSTGRES_PASSWORD: ${YOUR_SECURE_SECRET}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U xiaoyue" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.25"
          memory: 2816M
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ══════════════════════════════════════════════════════════
  #  CORE DJANGO — 2 CPU / 6 GB RAM
  # ══════════════════════════════════════════════════════════

  # ── Django API Gateway ──
  core-django:
    build:
      context: ./core_django
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://xiaoyue:${YOUR_SECURE_SECRET}@db:5432/xiaoyue
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AI_SERVICE_EN_URL=http://ai-service-en:8000/api/v1/score
      - AI_SERVICE_ZH_URL=http://ai-service-zh:8001/api/v1/score
    env_file:
      - ./core_django/.env
    volumes:
      - ./core_django:/app
      - django_static:/app/staticfiles
      - django_media:/app/media
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 3G
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Worker (Core tasks & Translation) ──
  celery-worker-core:
    build:
      context: ./core_django
    command: celery -A core_project worker -Q queue_core --loglevel=info --concurrency=4
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://xiaoyue:${YOUR_SECURE_SECRET}@db:5432/xiaoyue
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - ./core_django/.env
    volumes:
      - ./core_django:/app
      - django_media:/app/media
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Worker (AI English Audio) ──
  celery-worker-ai-en:
    build:
      context: ./core_django
    command: celery -A core_project worker -Q queue_ai_en --loglevel=info --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://xiaoyue:${YOUR_SECURE_SECRET}@db:5432/xiaoyue
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AI_SERVICE_EN_URL=http://ai-service-en:8000/api/v1/score
    volumes:
      - ./core_django:/app
      - django_media:/app/media
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Worker (AI Chinese Audio) ──
  celery-worker-ai-zh:
    build:
      context: ./core_django
    command: celery -A core_project worker -Q queue_ai_zh --loglevel=info --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://xiaoyue:${YOUR_SECURE_SECRET}@db:5432/xiaoyue
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AI_SERVICE_ZH_URL=http://ai-service-zh:8001/api/v1/score
    volumes:
      - ./core_django:/app
      - django_media:/app/media
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1G
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ══════════════════════════════════════════════════════════
  #  AI SERVICE — CHINESE — 2 CPU / 6 GB RAM
  # ══════════════════════════════════════════════════════════

  ai-service-zh:
    build:
      context: ./ai_service_zh
    volumes:
      - ./ai_service_zh/models_cache:/app/models_cache
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 6G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: always
    networks:
      - xiaoyue-network

  # ══════════════════════════════════════════════════════════
  #  AI SERVICE — ENGLISH — 6 CPU / 16 GB RAM
  # ══════════════════════════════════════════════════════════

  ai-service-en:
    build:
      context: ./ai_service_en
    volumes:
      - ./ai_service_en/model:/app/model
    environment:
      - ONNX_MODEL_PATH=/app/model/pronunciation_scorer_fp16.onnx
      - WHISPER_MODEL_SIZE=base.en
      - WHISPER_CACHE_DIR=/app/model/whisper_cache
      - ORT_INTRA_OP_THREADS=4
      - ORT_INTER_OP_THREADS=1
      - OMP_NUM_THREADS=4
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 6G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: always
    networks:
      - xiaoyue-network

# ── Volumes ──
volumes:
  postgres_data:
  django_static:
  django_media:

    # ── Networks ──
networks:
  xiaoyue-network:
    driver: bridge
