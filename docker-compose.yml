version: "3.8"

services:
  # ══════════════════════════════════════════════════════════
  #  INFRASTRUCTURE — 2 CPU / 4 GB RAM
  # ══════════════════════════════════════════════════════════

  # ── Reverse Proxy & Router ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - django_static:/app/staticfiles:ro
      - django_media:/app/media:ro
    depends_on:
      core-django:
        condition: service_started
      ws-gateway:
        condition: service_started
      ai-service-en:
        condition: service_started
      ai-service-zh:
        condition: service_started
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Message Broker & Result Backend ──
  redis:
    image: redis:alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── WebSocket Gateway ──
  ws-gateway:
    build:
      context: ./ws_gateway
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Database ──
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xiaoyue}
      POSTGRES_USER: ${POSTGRES_USER:-xiaoyue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U xiaoyue" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ══════════════════════════════════════════════════════════
  #  CORE DJANGO — 2 CPU / 6 GB RAM
  # ══════════════════════════════════════════════════════════

  # ── Django API Gateway ──
  core-django:
    build:
      context: ./core_django
    command: ["gunicorn", "core_project.wsgi:application", "--bind", "0.0.0.0:8080", "--workers", "3", "--worker-class", "gthread", "--threads", "4", "--timeout", "120", "--access-logfile", "-", "--error-logfile", "-"]
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - AI_SERVICE_EN_URL=${AI_SERVICE_EN_URL:-http://ai-service-en:8000/api/v1/score}
      - AI_SERVICE_ZH_URL=${AI_SERVICE_ZH_URL:-http://ai-service-zh:8001/api/v1/score}
    env_file:
      - .env
    volumes:
      - ./core_django:/app
      - django_static:/app/staticfiles
      - django_media:/app/media
      - D:/XiaoYueDict_data:/data
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Worker (Core tasks & Translation) ──
  celery-worker-core:
    build:
      context: ./core_django
    command: celery -A core_project worker -Q queue_core --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    env_file:
      - .env
    volumes:
      - ./core_django:/app
      - django_media:/app/media
      - D:/XiaoYueDict_data:/data
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Beat (Scheduler) ──
  celery-beat:
    build:
      context: ./core_django
    command: celery -A core_project beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    env_file:
      - .env
    volumes:
      - ./core_django:/app
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Worker (Priority - Paid Queue) ──
  celery-worker-priority:
    build:
      context: ./core_django
    command: celery -A core_project worker -Q queue_paid --loglevel=info --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
      ai-service-en:
        condition: service_started
      ai-service-zh:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - AI_SERVICE_EN_URL=${AI_SERVICE_EN_URL:-http://ai-service-en:8000/api/v1/score}
      - AI_SERVICE_ZH_URL=${AI_SERVICE_ZH_URL:-http://ai-service-zh:8001/api/v1/score}
    env_file:
      - .env
    volumes:
      - ./core_django:/app
      - django_media:/app/media
      - D:/XiaoYueDict_data:/data
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Worker (Standard - Paid & Free Queues) ──
  celery-worker-standard:
    build:
      context: ./core_django
    command: celery -A core_project worker -Q queue_paid,queue_free --loglevel=info --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
      ai-service-en:
        condition: service_started
      ai-service-zh:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - AI_SERVICE_EN_URL=${AI_SERVICE_EN_URL:-http://ai-service-en:8000/api/v1/score}
      - AI_SERVICE_ZH_URL=${AI_SERVICE_ZH_URL:-http://ai-service-zh:8001/api/v1/score}
    env_file:
      - .env
    volumes:
      - ./core_django:/app
      - django_media:/app/media
      - D:/XiaoYueDict_data:/data
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Worker (Guest - Guest & Free Queues - Anti-starvation) ──
  celery-worker-guest:
    build:
      context: ./core_django
    command: celery -A core_project worker -Q queue_guest,queue_free --loglevel=info --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
      ai-service-en:
        condition: service_started
      ai-service-zh:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - AI_SERVICE_EN_URL=${AI_SERVICE_EN_URL:-http://ai-service-en:8000/api/v1/score}
      - AI_SERVICE_ZH_URL=${AI_SERVICE_ZH_URL:-http://ai-service-zh:8001/api/v1/score}
    env_file:
      - .env
    volumes:
      - ./core_django:/app
      - django_media:/app/media
      - D:/XiaoYueDict_data:/data
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ══════════════════════════════════════════════════════════
  #  AI SERVICE — CHINESE — 2 CPU / 6 GB RAM
  # ══════════════════════════════════════════════════════════

  ai-service-zh:
    build:
      context: ./ai_service_zh
    volumes:
      - ./ai_service_zh/models_cache:/app/models_cache
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: always
    networks:
      - xiaoyue-network

  # ══════════════════════════════════════════════════════════
  #  AI SERVICE — ENGLISH — 4 CPU / 16 GB RAM
  # ══════════════════════════════════════════════════════════

  ai-service-en:
    build:
      context: ./ai_service_en
    volumes:
      - ./ai_service_en/model:/app/model
    environment:
      - ONNX_MODEL_PATH=/app/model/pronunciation_scorer_fp16.onnx
      - WHISPER_MODEL_SIZE=base.en
      - WHISPER_CACHE_DIR=/app/model/whisper_cache
      - ORT_INTRA_OP_THREADS=2
      - ORT_INTER_OP_THREADS=1
      - OMP_NUM_THREADS=2
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: always
    networks:
      - xiaoyue-network

  # ── PDF Render Service ──
  pdf-service:
    build:
      context: ./pdf_service
    ports:
      - "8082:8082"
    volumes:
      - ./pdf_service:/app
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── TTS Service ──
  tts-service:
    build:
      context: ./tts_service
    ports:
      - "8002:8002"
    volumes:
      - ./tts_service/cache:/app/cache
      - ./core_django/key.json:/app/key.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/key.json
      - GS_BUCKET_NAME=${GS_BUCKET_NAME:-cnen-bucket}
      - DEFAULT_ZH_VOICE=zh-CN-XiaoxiaoNeural
      - DEFAULT_EN_VOICE=en-US-AriaNeural
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Image Service ──
  image-service:
    build:
      context: ./image_service
    ports:
      - "127.0.0.1:8003:8003"
    volumes:
      - ./image_service/cache:/app/cache
      - ./core_django/key.json:/app/key.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/key.json
      - GS_BUCKET_NAME=${GS_BUCKET_NAME:-cnen-bucket}
    restart: unless-stopped
    networks:
      - xiaoyue-network

# ── Volumes ──
volumes:
  postgres_data:
  django_static:
  django_media:

    # ── Networks ──
networks:
  xiaoyue-network:
    driver: bridge
