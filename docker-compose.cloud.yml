version: "3.8"

# ══════════════════════════════════════════════════════════════
#  XiaoYueDict — Cloud VPS Stack
#  Runs ALL services EXCEPT ai-service-en & ai-service-zh
#  (AI services run on local GPU machine, accessed via private IP)
#
#  Usage:
#    docker compose -f docker-compose.cloud.yml up -d
# ══════════════════════════════════════════════════════════════

services:
  # ══════════════════════════════════════════════════════════
  #  INFRASTRUCTURE
  # ══════════════════════════════════════════════════════════

  # ── Reverse Proxy & Router ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - /opt/xiaoyue/secure:/etc/nginx/certs:ro
      - django_static:/app/staticfiles:ro
      - django_media:/app/media:ro
    depends_on:
      core-django:
        condition: service_started
      ws-gateway:
        condition: service_started
    restart: unless-stopped
    networks:
      - xiaoyue-network

  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-xiaoyue_redis_secret}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-xiaoyue_redis_secret}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── WebSocket Gateway ──
  ws-gateway:
    build:
      context: ./ws_gateway
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=${REDIS_URL:-redis://:xiaoyue_redis_secret@redis:6379/0}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Database ──
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xiaoyue}
      POSTGRES_USER: ${POSTGRES_USER:-xiaoyue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U xiaoyue" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ══════════════════════════════════════════════════════════
  #  CORE DJANGO
  # ══════════════════════════════════════════════════════════

  # ── Django API Gateway ──
  core-django:
    build:
      context: ./core_django
    command: ["gunicorn", "core_project.wsgi:application", "--bind", "0.0.0.0:8080", "--workers", "3", "--worker-class", "gthread", "--threads", "4", "--timeout", "120", "--access-logfile", "-", "--error-logfile", "-"]
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:xiaoyue_redis_secret@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:xiaoyue_redis_secret@redis:6379/0}
      - AI_SERVICE_EN_URL=${AI_SERVICE_EN_URL}
      - AI_SERVICE_ZH_URL=${AI_SERVICE_ZH_URL}
    env_file:
      - .env
    volumes:
      - django_static:/app/staticfiles
      - django_media:/app/media
      - /opt/xiaoyue/data:/data
      - /opt/xiaoyue/secure/key.json:/app/key.json:ro
      - /opt/xiaoyue/secure/cnen-auth-key.json:/app/cnen-auth-key.json:ro
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Worker (Core tasks & Translation) ──
  celery-worker-core:
    build:
      context: ./core_django
    command: celery -A core_project worker -Q queue_core --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:xiaoyue_redis_secret@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:xiaoyue_redis_secret@redis:6379/0}
    env_file:
      - .env
    volumes:
      - django_media:/app/media
      - /opt/xiaoyue/data:/data
      - /opt/xiaoyue/secure/key.json:/app/key.json:ro
      - /opt/xiaoyue/secure/cnen-auth-key.json:/app/cnen-auth-key.json:ro
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Beat (Scheduler) ──
  celery-beat:
    build:
      context: ./core_django
    command: celery -A core_project beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:xiaoyue_redis_secret@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:xiaoyue_redis_secret@redis:6379/0}
    env_file:
      - .env
    volumes:
      - /opt/xiaoyue/secure/key.json:/app/key.json:ro
      - /opt/xiaoyue/secure/cnen-auth-key.json:/app/cnen-auth-key.json:ro
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Worker (Priority - Paid Queue) ──
  celery-worker-priority:
    build:
      context: ./core_django
    command: celery -A core_project worker -Q queue_paid --loglevel=info --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:xiaoyue_redis_secret@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:xiaoyue_redis_secret@redis:6379/0}
      - AI_SERVICE_EN_URL=${AI_SERVICE_EN_URL}
      - AI_SERVICE_ZH_URL=${AI_SERVICE_ZH_URL}
    env_file:
      - .env
    volumes:
      - django_media:/app/media
      - /opt/xiaoyue/data:/data
      - /opt/xiaoyue/secure/key.json:/app/key.json:ro
      - /opt/xiaoyue/secure/cnen-auth-key.json:/app/cnen-auth-key.json:ro
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Worker (Standard - Paid & Free Queues) ──
  celery-worker-standard:
    build:
      context: ./core_django
    command: celery -A core_project worker -Q queue_paid,queue_free --loglevel=info --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:xiaoyue_redis_secret@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:xiaoyue_redis_secret@redis:6379/0}
      - AI_SERVICE_EN_URL=${AI_SERVICE_EN_URL}
      - AI_SERVICE_ZH_URL=${AI_SERVICE_ZH_URL}
    env_file:
      - .env
    volumes:
      - django_media:/app/media
      - /opt/xiaoyue/data:/data
      - /opt/xiaoyue/secure/key.json:/app/key.json:ro
      - /opt/xiaoyue/secure/cnen-auth-key.json:/app/cnen-auth-key.json:ro
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Celery Worker (Guest - Guest & Free Queues - Anti-starvation) ──
  celery-worker-guest:
    build:
      context: ./core_django
    command: celery -A core_project worker -Q queue_guest,queue_free --loglevel=info --concurrency=1
    depends_on:
      redis:
        condition: service_healthy
      core-django:
        condition: service_started
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://:xiaoyue_redis_secret@redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://:xiaoyue_redis_secret@redis:6379/0}
      - AI_SERVICE_EN_URL=${AI_SERVICE_EN_URL}
      - AI_SERVICE_ZH_URL=${AI_SERVICE_ZH_URL}
    env_file:
      - .env
    volumes:
      - django_media:/app/media
      - /opt/xiaoyue/data:/data
      - /opt/xiaoyue/secure/key.json:/app/key.json:ro
      - /opt/xiaoyue/secure/cnen-auth-key.json:/app/cnen-auth-key.json:ro
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── PDF Render Service ──
  pdf-service:
    build:
      context: ./pdf_service
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── TTS Service ──
  tts-service:
    build:
      context: ./tts_service
    volumes:
      - ./tts_service/cache:/app/cache
      - /opt/xiaoyue/secure/key.json:/app/key.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/key.json
      - GS_BUCKET_NAME=${GS_BUCKET_NAME:-cnen-bucket}
      - DEFAULT_ZH_VOICE=zh-CN-XiaoxiaoNeural
      - DEFAULT_EN_VOICE=en-US-AriaNeural
    restart: unless-stopped
    networks:
      - xiaoyue-network

  # ── Image Service ──
  image-service:
    build:
      context: ./image_service
    volumes:
      - ./image_service/cache:/app/cache
      - /opt/xiaoyue/secure/key.json:/app/key.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/key.json
      - GS_BUCKET_NAME=${GS_BUCKET_NAME:-cnen-bucket}
    restart: unless-stopped
    networks:
      - xiaoyue-network

# ── Volumes ──
volumes:
  postgres_data:
  django_static:
  django_media:

# ── Networks ──
networks:
  xiaoyue-network:
    driver: bridge
