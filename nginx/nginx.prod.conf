worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Docker DNS Resolver ──
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── General Settings ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Audio file uploads can be large (up to 50MB)
    client_max_body_size 50m;

    # ── Cloudflare Real IP configuration ──
    # Cloudflare IPv4 Ranges
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;

    # Cloudflare IPv6 Ranges
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    real_ip_header CF-Connecting-IP;

    # ── Rate Limiting Zones ──
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;

    # ── Main Server (api.cnendict.xyz) ──
    # SSL is terminated by Cloudflare Proxy (orange cloud).
    # Nginx listens on HTTP port 80 and HTTPS port 443 with a self-signed certificate.
    server {
        listen 80;
        listen 443 ssl;
        server_name api.cnendict.xyz;

        # ── SSL Configuration ──
        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # ── Security Headers ──
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; media-src 'self' https:; connect-src 'self' wss: https:;" always;

        # ── Nginx Health Check ──
        location = /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ──────────────────────────────────────────────
        #  Core Django API — /api/core/...
        #  NOTE: rewrite is required because variable-based
        #  proxy_pass does NOT do automatic URI substitution.
        # ──────────────────────────────────────────────

        # /api/core/exams/* → core-django /api/v1/exams/*
        location /api/core/exams/ {
            limit_req zone=api_general burst=20 nodelay;
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/exams/(.*)$ /api/v1/exams/$1 break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/assessments/* → core-django /api/v1/assessments/*
        location /api/core/assessments/ {
            limit_req zone=api_general burst=20 nodelay;
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/assessments/(.*)$ /api/v1/assessments/$1 break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/notes/* → core-django /api/v1/notes/*
        location /api/core/notes/ {
            limit_req zone=api_general burst=20 nodelay;
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/notes/(.*)$ /api/v1/notes/$1 break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /admin/* → core-django /admin/*
        location /admin/ {
            limit_req zone=api_auth burst=5 nodelay;
            set $django_upstream http://core-django:8080;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/dictionary/* → core-django /api/v1/dictionary/*
        location /api/core/dictionary/ {
            limit_req zone=api_general burst=20 nodelay;
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/dictionary/(.*)$ /api/v1/dictionary/$1 break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/users/* → core-django /api/v1/users/*
        location /api/core/users/ {
            limit_req zone=api_auth burst=10 nodelay;
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/users/+$ /api/v1/users/ break;
            rewrite ^/api/core/users/(.+?)/?$ /api/v1/users/$1/ break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/gamification/* → core-django /api/v1/gamification/*
        location /api/core/gamification/ {
            limit_req zone=api_general burst=20 nodelay;
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/gamification/+$ /api/v1/gamification/ break;
            rewrite ^/api/core/gamification/(.+?)/?$ /api/v1/gamification/$1/ break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/subscriptions/* → core-django /api/v1/subscriptions/*
        location /api/core/subscriptions/ {
            limit_req zone=api_general burst=20 nodelay;
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/subscriptions/+$ /api/v1/subscriptions/ break;
            rewrite ^/api/core/subscriptions/(.+?)/?$ /api/v1/subscriptions/$1/ break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }
        # /api/core/notifications/* → core-django /api/v1/notifications/*
        location /api/core/notifications {
            limit_req zone=api_general burst=20 nodelay;
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/notifications/?$ /api/v1/notifications/ break;
            rewrite ^/api/core/notifications/(.+?)/?$ /api/v1/notifications/$1/ break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/media/* → core-django /api/v1/media/*
        location /api/core/media/ {
            limit_req zone=api_general burst=20 nodelay;
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/media/(.*)$ /api/v1/media/$1 break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/reports/* → core-django /api/v1/reports/*
        location /api/core/reports/ {
            limit_req zone=api_general burst=20 nodelay;
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/reports/(.*)$ /api/v1/reports/$1 break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # Django static files
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            add_header X-Content-Type-Options "nosniff";

            access_log off;
            log_not_found off;
        }

        # Django media files
        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            add_header X-Content-Type-Options "nosniff";

            access_log off;
            log_not_found off;
        }

        # ──────────────────────────────────────────────
        #  TTS Service — /api/v1/tts
        # ──────────────────────────────────────────────
        location /api/v1/tts {
            limit_req zone=api_general burst=20 nodelay;
            set $tts_upstream http://tts-service:8002;
            proxy_pass $tts_upstream;
            include /etc/nginx/proxy_params;
        }

        # ──────────────────────────────────────────────
        #  WebSocket Gateway — /ws/...
        #  Security: query string stripped from logs
        #  to prevent JWT token leakage.
        # ──────────────────────────────────────────────
        location /ws/ {
            set $ws_upstream http://ws-gateway:8005;
            proxy_pass $ws_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Long timeout for persistent WebSocket connections (1 hour)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Suppress full URI logging to hide ?token= from access logs
            access_log off;
        }

        # ── Catch-all: 404 ──
        location / {
            default_type application/json;
            return 404 '{"error":"Not Found","hint":"Valid prefixes: /api/core/, /ws/, /admin/"}';
        }
    }
}
