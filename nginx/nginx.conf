worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstream Definitions ──
    upstream core_django {
        server core-django:8080;
    }

    upstream ai_en {
        server ai-service-en:8000;
    }

    upstream ai_zh {
        server ai-service-zh:8001;
    }

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── General Settings ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Audio file uploads can be large (up to 50MB)
    client_max_body_size 50m;

    # ── Main Server ──
    server {
        listen 80;
        server_name _;

        # ── Nginx Health Check ──
        location = /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ──────────────────────────────────────────────
        #  Core Django API — /api/core/...
        # ──────────────────────────────────────────────

        # /api/core/exams/* → core-django /api/v1/exams/*
        location /api/core/exams/ {
            proxy_pass http://core_django/api/v1/exams/;
            include /etc/nginx/proxy_params;
        }

        # /api/core/assessments/* → core-django /api/v1/assessments/*
        location /api/core/assessments/ {
            proxy_pass http://core_django/api/v1/assessments/;
            include /etc/nginx/proxy_params;
        }

        # /api/core/notes/* → core-django /api/v1/notes/*
        location /api/core/notes/ {
            proxy_pass http://core_django/api/v1/notes/;
            include /etc/nginx/proxy_params;
        }

        # /api/core/admin/* → core-django /admin/*
        location /api/core/admin/ {
            proxy_pass http://core_django/admin/;
            include /etc/nginx/proxy_params;
        }

        # Django static files
        location /static/ {
            proxy_pass http://core_django/static/;
            include /etc/nginx/proxy_params;
        }

        # Django media files
        location /media/ {
            alias /app/media/;
            # Add cache headers for media
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # ──────────────────────────────────────────────
        #  AI English Service — /api/ai/en/...
        # ──────────────────────────────────────────────

        # /api/ai/en/score → ai-service-en /api/v1/score
        location = /api/ai/en/score {
            proxy_pass http://ai_en/api/v1/score;
            include /etc/nginx/proxy_params;

            # AI inference can take 30-120s for large audio
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # /api/ai/en/health → ai-service-en /health
        location = /api/ai/en/health {
            proxy_pass http://ai_en/health;
            include /etc/nginx/proxy_params;
        }

        # ──────────────────────────────────────────────
        #  AI Chinese Service — /api/ai/zh/...
        # ──────────────────────────────────────────────

        # /api/ai/zh/score → ai-service-zh /api/v1/score
        location = /api/ai/zh/score {
            proxy_pass http://ai_zh/api/v1/score;
            include /etc/nginx/proxy_params;

            # AI inference can take 30-120s for large audio
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # /api/ai/zh/health → ai-service-zh /health
        location = /api/ai/zh/health {
            proxy_pass http://ai_zh/health;
            include /etc/nginx/proxy_params;
        }

        # ── Catch-all: 404 ──
        location / {
            return 404 '{"error":"Not Found","hint":"Valid prefixes: /api/core/, /api/ai/en/, /api/ai/zh/"}';
            add_header Content-Type application/json;
        }
    }
}
