worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Docker DNS Resolver ──
    # Forces nginx to re-resolve hostnames on every request,
    # preventing stale IP when containers are recreated.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── General Settings ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Audio file uploads can be large (up to 50MB)
    client_max_body_size 50m;

    # ── Main Server ──
    server {
        listen 80;
        server_name _;

        # ── Nginx Health Check ──
        location = /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ──────────────────────────────────────────────
        #  Core Django API — /api/core/...
        #  NOTE: rewrite is required because variable-based
        #  proxy_pass does NOT do automatic URI substitution.
        # ──────────────────────────────────────────────

        # /api/core/exams/* → core-django /api/v1/exams/*
        location /api/core/exams/ {
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/exams/(.*)$ /api/v1/exams/$1 break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/assessments/* → core-django /api/v1/assessments/*
        location /api/core/assessments/ {
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/assessments/(.*)$ /api/v1/assessments/$1 break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/notes/* → core-django /api/v1/notes/*
        location /api/core/notes/ {
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/notes/(.*)$ /api/v1/notes/$1 break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/admin/* → core-django /admin/*
        location /api/core/admin/ {
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/admin/(.*)$ /admin/$1 break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/dictionary/* → core-django /api/v1/dictionary/*
        location /api/core/dictionary/ {
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/dictionary/(.*)$ /api/v1/dictionary/$1 break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/users/* → core-django /api/v1/users/*
        location /api/core/users/ {
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/users/(.*?)/?$ /api/v1/users/$1/ break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/gamification/* → core-django /api/v1/gamification/*
        location /api/core/gamification/ {
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/gamification/(.*?)/?$ /api/v1/gamification/$1/ break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/subscriptions/* → core-django /api/v1/subscriptions/*
        location /api/core/subscriptions/ {
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/subscriptions/(.*?)/?$ /api/v1/subscriptions/$1/ break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # /api/core/notifications/* → core-django /api/v1/notifications/*
        location /api/core/notifications/ {
            set $django_upstream http://core-django:8080;
            rewrite ^/api/core/notifications/(.*?)/?$ /api/v1/notifications/$1/ break;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # Django static files
        location /static/ {
            set $django_upstream http://core-django:8080;
            proxy_pass $django_upstream;
            include /etc/nginx/proxy_params;
        }

        # Django media files
        location /media/ {
            alias /app/media/;
            # Add cache headers for media
            expires 30d;
            add_header Cache-Control "public, no-transform";
            
            # Disable access logging for static assets to reduce I/O load
            access_log off;
            log_not_found off;
        }

        # ──────────────────────────────────────────────
        #  WebSocket Gateway — /ws/...
        #  Security: query string stripped from logs
        #  to prevent JWT token leakage.
        # ──────────────────────────────────────────────
        location /ws/ {
            set $ws_upstream http://ws-gateway:8005;
            proxy_pass $ws_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Long timeout for persistent WebSocket connections (1 hour)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Suppress full URI logging to hide ?token= from access logs
            access_log off;
        }

        # ── Catch-all: 404 ──
        location / {
            return 404 '{"error":"Not Found","hint":"Valid prefixes: /api/core/, /api/ai/en/, /api/ai/zh/, /ws/"}';
            add_header Content-Type application/json;
        }
    }
}
